$kind: http-request
description: Имеет смысл после сценария с заказом; может быть 4xx если статус не позволяет.
url: "{{baseUrl}}/api/orders/{{orderId}}/cancel"
method: PUT
headers:
  Authorization: Bearer {{customerToken}}
scripts:
  - type: afterResponse
    code: pm.test('Ответ получен', () => pm.response.code !== 0);
    language: text/javascript
order: 9000
