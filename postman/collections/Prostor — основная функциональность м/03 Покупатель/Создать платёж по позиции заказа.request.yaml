$kind: http-request
url: "{{baseUrl}}/api/payments/order-item/{{orderItemId}}"
method: POST
headers:
  Authorization: Bearer {{customerToken}}
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
        const j = pm.response.json();
        if (j.id != null) pm.environment.set('paymentId', String(j.id));
      }
      pm.test('Ответ получен', () => pm.response.code !== 0);
    language: text/javascript
order: 7000
