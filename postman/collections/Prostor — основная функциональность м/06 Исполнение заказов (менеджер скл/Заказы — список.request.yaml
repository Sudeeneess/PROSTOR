$kind: http-request
url: "{{baseUrl}}/api/orders?page=0&size=20"
method: GET
headers:
  Authorization: Bearer {{managerToken}}
queryParams:
  page: "0"
  size: "20"
scripts:
  - type: afterResponse
    code: |-
      try {
        const j = pm.response.json();
        if (j.content && j.content[0] && j.content[0].id != null)
          pm.environment.set('orderId', String(j.content[0].id));
      } catch (e) {}
    language: text/javascript
order: 4000
