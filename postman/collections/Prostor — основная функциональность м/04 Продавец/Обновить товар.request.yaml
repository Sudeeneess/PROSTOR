$kind: http-request
url: "{{baseUrl}}/api/seller/products/{{sellerProductId}}"
method: PUT
headers:
  Authorization: Bearer {{sellerToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Товар из Postman (обновлён)",
      "price": 2099.99,
      "sellerId": 1,
      "categoryId": {{categoryId}}
    }
scripts:
  - type: afterResponse
    code: pm.test('Ответ получен', () => pm.response.code !== 0);
    language: text/javascript
order: 5000
