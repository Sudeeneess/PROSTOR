$kind: collection
name: Prostor — основная функциональность маркетплейса
description: >-
  Сценарии ВКР: витрина (гость), регистрация, покупатель (заказ, оплата,
  отмена), продавец (CRUD товаров), администратор, исполнение заказов менеджером
  склада.


  Импорт с окружением **Prostor Local**. Для заказов покупателя нужен
  `customerId` записи customer (после Flyway V9 у john_doe обычно id=1). Запрос
  «Мои заказы по customerId» может вернуть 403, если в JWT principal без поля
  `id` — проверьте `OrderController`.


  Рекомендуемый порядок Runner: 01 → 02 (опц.) → 03 → 04 → 05 → 06.
