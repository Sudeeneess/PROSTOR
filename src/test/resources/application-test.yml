spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/prostor_test
    username: postuser
    password: test123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    clean-disabled: false
    clean-on-validation-error: true
    target: 8

app:
  jwt:
    secret: "bPtQY64XGHrg9NGAzHWGo3IrwzH0FQtCII9RlSylZdgEJr3pfi8X7c3yVYdrYA6UvXQK6bGx5zrIpL3w5pV3wZ"
    expiration: 86400000
  security:
    cors:
      allowed-origins: "http://localhost:3001,http://localhost:3000"
  commission:
    rate: 0.10

server:
  port: 0

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
    com.prostor: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE