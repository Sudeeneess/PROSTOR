version: '3.8'
services:
  prostor_db:
    image: postgres:15-alpine
    container_name: prostor_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - prostor_data:/var/lib/postgresql/data
volumes:
  prostor_data: